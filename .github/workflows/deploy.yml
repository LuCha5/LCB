name: Déploiement OVH (FTP)

# Déploie automatiquement le site sur le serveur OVH à chaque push sur "master".
# La branche "dev" ne déclenche RIEN : tu peux y tester tranquillement.
on:
  push:
    branches: [ master ]
  workflow_dispatch:        # bouton "Run workflow" pour déployer à la main si besoin

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Envoi par FTP vers OVH
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}     # ex : ftp.cluster0XX.hosting.ovh.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          server-dir: /www/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
